name: CI

# Cost model, public-repo edition: GitHub-hosted runners are free and
# unlimited for public repositories, so everything runs hosted.
#   push  → LIGHT job on Linux (fmt + clippy + unit tests). Fast feedback on
#           every branch.
#   PR    → FULL suite on Linux, Windows and macOS — the same three platforms
#           releases ship for.
#   workflow_dispatch → the FULL matrix, on demand, for any branch.
# Superseded runs are cancelled per-ref (the silent minute-burner).
#
# Self-hosted runners are deliberately gone: on a public repository a pull
# request from a fork that reaches a self-hosted runner is arbitrary code
# execution on that machine. Do not reintroduce them here.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── push → light: fmt + clippy + unit tests (no integration) ──────────────
  light:
    if: github.event_name == 'push'
    name: light (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2-rust
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Unit tests (lib, no integration)
        run: cargo test --lib

  # ── pull_request / dispatch → full suite on every shipped platform ────────
  full:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    name: full (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2-rust
      # The cargo cache restores target/, and an interrupted earlier run can
      # leave a stale artifact for our own crate that surfaces as
      # `error[E0463]: can't find crate for tazamun`. Rebuilding just this
      # crate is cheap; the expensive dependency cache is preserved.
      - name: Clean local-crate cache (stale-artifact guard)
        run: cargo clean -p tazamun
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test (full suite)
        run: cargo test --all-targets
